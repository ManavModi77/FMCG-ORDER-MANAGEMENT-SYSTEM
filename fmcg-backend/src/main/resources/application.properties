spring.application.name=fmcg-backend

# MySQL Connection (Using Environment Variables for Safety)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Hibernate & JPA (Set to 'validate' to protect your migrated data)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Port (Render provides a dynamic port, so we use this variable)
server.port=${PORT:8080}

# JWT (Using Environment Variable for Security)
jwt.secret=${JWT_SECRET}